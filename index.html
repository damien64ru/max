<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; background: #f0f2f5; }
        .loader { border: 4px solid #e0e0e0; border-top: 4px solid #2b6ef0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d32f2f; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="message">Перенаправление...</div>
    <script>
        const BOT_URL = 'https://maks-damien64ru.amvera.io';
        
        function getCampaignId() {
            if (window.MiniApp && typeof window.MiniApp.getStartParams === 'function') {
                try {
                    const params = window.MiniApp.getStartParams();
                    if (params && params.startapp) return params.startapp;
                } catch(e) { console.warn(e); }
            }
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('startapp')) return urlParams.get('startapp');
            return null;
        }
        
        function getUserId() {
            if (window.MiniApp && typeof window.MiniApp.getUser === 'function') {
                try {
                    const user = window.MiniApp.getUser();
                    if (user && user.id) return user.id;
                } catch(e) { console.warn(e); }
            }
            if (window.WebApp && window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
                return window.WebApp.initDataUnsafe.user.id;
            }
            return null;
        }
        
        const campaignId = getCampaignId();
        const userId = getUserId();
        
        if (!campaignId) {
            document.getElementById('message').innerHTML = '<span class="error">Ошибка: идентификатор кампании не найден</span>';
            document.querySelector('.loader').style.display = 'none';
            console.error('No campaignId');
        } else {
            let url = `${BOT_URL}/getLink?campaignId=${encodeURIComponent(campaignId)}`;
            if (userId) {
                url += `&userId=${userId}`;
                console.log(`Передаю userId: ${userId}`);
            } else {
                console.warn('UserId не получен, переход не будет отслежен');
            }
            console.log('Request URL:', url);
            
            fetch(url, { method: 'GET', headers: { 'Content-Type': 'application/json' } })
                .then(response => response.ok ? response.json() : Promise.reject('HTTP ' + response.status))
                .then(data => {
                    if (data && data.link) {
                        window.location.replace(data.link);
                        setTimeout(() => {
                            document.getElementById('message').innerHTML = `Не удалось перенаправить. <a href="${data.link}" target="_top">Открыть канал вручную</a>`;
                            document.querySelector('.loader').style.display = 'none';
                        }, 5000);
                    } else {
                        throw new Error('Ссылка не получена');
                    }
                })
                .catch(err => {
                    document.getElementById('message').innerHTML = `<span class="error">Ошибка: ${err.message}</span>`;
                    document.querySelector('.loader').style.display = 'none';
                    console.error(err);
                });
        }
    </script>
</body>
</html>
