<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <!-- JavaScript-код, который выполнится при загрузке страницы -->
  <script>
    // [MAX: Инструкция для мини-приложения] Получение параметра из ссылки
    // Допустим, мы запускаем наше приложение по ссылке вида: https://max.ru/имя_бота?startapp=id_канала
    const urlParams = new URLSearchParams(window.location.search);
    let campaignId = urlParams.get('startapp'); // Извлекаем значение параметра 'startapp'
    
    // [MAX: Инструкция для мини-приложения] Формирование ссылки-приглашения в ваш канал
    // Замените 'канал' на реальное имя (без @) вашего канала, куда бот является админом.
    const channelUrl = 'https://max.me/канал';
    
    // Функция для уведомления бота о переходе (отправит запрос на указанный вами URL)
    function notifyBot() {
        // Замените URL на адрес вашего сервера или используйте другой способ уведомления бота
        const botNotificationUrl = `https://ваш-сервер.com/track?campaign_id=${campaignId}&user_id=...`;
        // Здесь можно отправить fetch-запрос к вашему серверу. Это сложный момент, требующий отдельной настройки.
        console.log(`[MAX: Инструкция для мини-приложения] Отправка данных на сервер: ${botNotificationUrl}`);
    }
    
    // Мгновенное перенаправление на канал
    if (channelUrl) {
        window.location.replace(channelUrl);
    } else {
        // Если ссылка на канал не задана, просто выводим сообщение
        document.body.innerHTML = '<p>Привет! Переход на канал...</p>';
    }
    
    // Вызываем уведомление бота (можно заменить на вызов вашего API)
    if (campaignId) {
        notifyBot();
    }
  </script>
</head>
<body>
  <p>Перенаправление...</p>
</body>
</html>
