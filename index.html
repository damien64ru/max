<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2b6ef0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d32f2f; }
        .button { background: #2b6ef0; color: white; text-decoration: none; padding: 12px 24px; border-radius: 12px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="message">Загрузка...</div>
    <div id="error"></div>
    <script>
        const BOT_URL = 'https://maks-damien64ru.amvera.io';
        
        function getCampaignId() {
            if (window.MiniApp && typeof window.MiniApp.getStartParams === 'function') {
                try {
                    const params = window.MiniApp.getStartParams();
                    if (params && params.startapp) return params.startapp;
                } catch(e) { console.warn(e); }
            }
            if (window.WebApp && window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.start_param) {
                return window.WebApp.initDataUnsafe.start_param;
            }
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('startapp')) return urlParams.get('startapp');
            if (urlParams.has('tgWebAppStartParam')) return urlParams.get('tgWebAppStartParam');
            return null;
        }
        
        function getUserId() {
            if (window.MiniApp && typeof window.MiniApp.getUser === 'function') {
                try {
                    const user = window.MiniApp.getUser();
                    if (user && user.id) return user.id;
                } catch(e) {}
            }
            if (window.WebApp && window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
                return window.WebApp.initDataUnsafe.user.id;
            }
            return null;
        }
        
        const campaignId = getCampaignId();
        const userId = getUserId();
        
        if (!campaignId) {
            document.getElementById('message').innerHTML = '<span class="error">Ошибка: идентификатор кампании не найден</span>';
            document.querySelector('.loader').style.display = 'none';
            console.error('No campaignId');
        } else {
            let url = `${BOT_URL}/getLink?campaignId=${encodeURIComponent(campaignId)}`;
            if (userId) url += `&userId=${userId}`;
            console.log('Request URL:', url);
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.timeout = 5000;
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (data && data.link) {
                            window.location.replace(data.link);
                        } else {
                            throw new Error('Ссылка не получена');
                        }
                    } catch(e) {
                        document.getElementById('message').innerHTML = '<span class="error">Ошибка: неверный ответ сервера</span>';
                        document.querySelector('.loader').style.display = 'none';
                    }
                } else {
                    document.getElementById('message').innerHTML = `<span class="error">Ошибка: HTTP ${xhr.status}</span>`;
                    document.querySelector('.loader').style.display = 'none';
                }
            };
            xhr.onerror = function() {
                document.getElementById('message').innerHTML = '<span class="error">Ошибка соединения с сервером</span>';
                document.querySelector('.loader').style.display = 'none';
            };
            xhr.ontimeout = function() {
                document.getElementById('message').innerHTML = '<span class="error">Превышен таймаут запроса</span>';
                document.querySelector('.loader').style.display = 'none';
            };
            xhr.send();
        }
    </script>
</body>
</html>
