<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2b6ef0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="message">Перенаправление...</div>
    <script>
        const BOT_URL = 'https://maks-damien64ru.amvera.io';
        
        // --- КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ ЗДЕСЬ ---
        // Извлекаем campaignId из правильного поля start_param
        let campaignId = null;
        if (window.WebApp && window.WebApp.initDataUnsafe) {
            campaignId = window.WebApp.initDataUnsafe.start_param;
            console.log('Извлеченный campaignId из start_param:', campaignId);
        }
        
        // Резервный способ: проверяем URL на случай отладки в браузере
        if (!campaignId) {
            const urlParams = new URLSearchParams(window.location.search);
            campaignId = urlParams.get('startapp');
            if (campaignId) console.log('Резервный campaignId из URL:', campaignId);
        }
        
        // Извлекаем userId (без изменений)
        let userId = null;
        if (window.WebApp && window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
            userId = window.WebApp.initDataUnsafe.user.id;
            console.log('Извлеченный userId:', userId);
        }
        
        if (!campaignId) {
            document.getElementById('message').innerHTML = '<span class="error">Ошибка: идентификатор кампании не найден. Проверьте формат ссылки.</span>';
            document.querySelector('.loader').style.display = 'none';
            console.error('Не удалось найти campaignId в initDataUnsafe.start_param');
        } else {
            let url = `${BOT_URL}/getLink?campaignId=${encodeURIComponent(campaignId)}`;
            if (userId) url += `&userId=${userId}`;
            console.log('Запрос к боту:', url);
            
            fetch(url)
                .then(res => res.ok ? res.json() : Promise.reject(`HTTP ${res.status}`))
                .then(data => {
                    if (data && data.link) {
                        console.log('Перенаправление на:', data.link);
                        window.location.replace(data.link);
                        setTimeout(() => {
                            document.getElementById('message').innerHTML = `Не удалось перенаправить автоматически. <a href="${data.link}" target="_top">Открыть канал вручную</a>`;
                            document.querySelector('.loader').style.display = 'none';
                        }, 5000);
                    } else {
                        throw new Error('Ссылка не получена от бота');
                    }
                })
                .catch(err => {
                    document.getElementById('message').innerHTML = `<span class="error">Ошибка: ${err.message}</span>`;
                    document.querySelector('.loader').style.display = 'none';
                    console.error('Ошибка запроса к боту:', err);
                });
        }
    </script>
</body>
</html>
