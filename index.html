<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редирект на канал</title>
    <style>
        body { font-family: system-ui; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border-radius: 24px; padding: 32px; max-width: 400px; text-align: center; }
        .spinner { width: 40px; height: 40px; margin: 20px auto; border: 4px solid #e0e0e0; border-top: 4px solid #2b6ef0; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d32f2f; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="spinner"></div>
    <p>Перенаправление...</p>
    <div id="errorMessage" class="error" style="display:none;"></div>
</div>
<script>
    const BOT_SERVER_URL = 'https://maks-damien64ru.amvera.io';
    const campaignId = new URLSearchParams(window.location.search).get('startapp');
    if (!campaignId) showError('Нет campaignId');
    else fetch(`${BOT_SERVER_URL}/getLink?campaignId=${campaignId}`)
        .then(r => r.json())
        .then(data => data.link ? window.location.replace(data.link) : showError('Нет ссылки'))
        .catch(e => showError('Ошибка: ' + e.message));
    function showError(msg) {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('errorMessage').innerText = msg;
        document.getElementById('errorMessage').style.display = 'block';
    }
</script>
</body>
</html>
