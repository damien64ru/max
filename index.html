<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <!-- ВАЖНО: подключаем библиотеку MAX -->
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body {
            font-family: system-ui;
            text-align: center;
            padding: 50px;
            background: #f0f2f5;
        }
        .loader {
            border: 4px solid #e0e0e0;
            border-top: 4px solid #2b6ef0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #d32f2f;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="message">Перенаправление...</div>

    <script>
        // ==== НАСТРОЙКИ ====
        const BOT_URL = 'https://maks-damien64ru.amvera.io';
        
        // ==== ПОЛУЧАЕМ ID КАМПАНИИ ====
        let campaignId = null;
        
        // Пытаемся получить параметр из разных мест
        if (window.MiniApp && typeof window.MiniApp.getStartParam === 'function') {
            campaignId = window.MiniApp.getStartParam();
        }
        
        if (!campaignId && window.location.search) {
            const urlParams = new URLSearchParams(window.location.search);
            campaignId = urlParams.get('startapp');
        }
        
        // ==== ПОЛУЧАЕМ ID ПОЛЬЗОВАТЕЛЯ ====
        let userId = null;
        if (window.MiniApp && typeof window.MiniApp.getUser === 'function') {
            const user = window.MiniApp.getUser();
            if (user && user.id) userId = user.id;
        }
        
        // ==== ЕСЛИ ID КАМПАНИИ НЕ НАЙДЕН ====
        if (!campaignId) {
            document.getElementById('message').innerHTML = '<span class="error">Ошибка: идентификатор кампании не найден</span>';
            document.querySelector('.loader').style.display = 'none';
            console.error('No campaignId found.');
        } 
        // ==== ЕСЛИ ВСЕ ХОРОШО, ДЕЛАЕМ ЗАПРОС ====
        else {
            let url = `${BOT_URL}/getLink?campaignId=${encodeURIComponent(campaignId)}`;
            if (userId) url += `&userId=${userId}`;
            
            // Используем стандартный Fetch API
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (data && data.link) {
                        window.location.replace(data.link);
                    } else {
                        throw new Error('No link received');
                    }
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    document.getElementById('message').innerHTML = `<span class="error">Ошибка: ${err.message}</span>`;
                    document.querySelector('.loader').style.display = 'none';
                });
        }
    </script>
</body>
</html>
