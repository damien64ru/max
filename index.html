<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2b6ef0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="message">Проверка ссылки...</div>
    <script>
        const BOT_URL = 'https://maks-damien64ru.amvera.io';
        const campaignId = new URLSearchParams(location.search).get('startapp');

        if (!campaignId) {
            document.getElementById('message').innerHTML = '<span class="error">Ошибка: отсутствует идентификатор кампании</span>';
            document.querySelector('.loader').style.display = 'none';
        } else {
            fetch(`${BOT_URL}/getLink?campaignId=${encodeURIComponent(campaignId)}`)
                .then(response => response.ok ? response.json() : Promise.reject('HTTP ' + response.status))
                .then(data => {
                    if (data && data.link) {
                        // Автоматический переход
                        window.location.replace(data.link);
                        // Через 5 секунд покажем сообщение, если редирект не случился
                        setTimeout(() => {
                            document.getElementById('message').innerHTML = `Перенаправление не произошло. <a href="${data.link}" target="_top">Открыть канал вручную</a>`;
                            document.querySelector('.loader').style.display = 'none';
                        }, 5000);
                    } else {
                        throw new Error('Ссылка не получена');
                    }
                })
                .catch(err => {
                    document.getElementById('message').innerHTML = `<span class="error">Ошибка: ${err.message || 'бот не отвечает'}</span>`;
                    document.querySelector('.loader').style.display = 'none';
                    console.error(err);
                });
        }
    </script>
</body>
</html>
