<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2b6ef0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="message">Перенаправление...</div>
    <script>
        const BOT_URL = 'https://maks-damien64ru.amvera.io';
        
        // Получение campaignId
        function getCampaignId() {
            if (window.WebApp?.initDataUnsafe?.start_param) 
                return window.WebApp.initDataUnsafe.start_param;
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('tgWebAppStartParam')) 
                return urlParams.get('tgWebAppStartParam');
            if (urlParams.has('startapp')) 
                return urlParams.get('startapp');
            return null;
        }
        
        // Получение userId
        function getUserId() {
            if (window.WebApp?.initDataUnsafe?.user?.id) 
                return window.WebApp.initDataUnsafe.user.id;
            return null;
        }
        
        const campaignId = getCampaignId();
        const userId = getUserId();
        
        if (!campaignId) {
            document.getElementById('message').innerHTML = '<span class="error">Ошибка: идентификатор кампании не найден</span>';
            document.querySelector('.loader').style.display = 'none';
        } else {
            let url = `${BOT_URL}/getLink?campaignId=${encodeURIComponent(campaignId)}`;
            if (userId) url += `&userId=${userId}`;
            console.log('Request URL:', url);
            
            fetch(url)
                .then(res => res.ok ? res.json() : Promise.reject(`HTTP ${res.status}`))
                .then(data => {
                    if (data?.link) {
                        window.location.replace(data.link);
                        setTimeout(() => {
                            document.getElementById('message').innerHTML = `Не удалось перенаправить. <a href="${data.link}" target="_top">Открыть канал вручную</a>`;
                            document.querySelector('.loader').style.display = 'none';
                        }, 5000);
                    } else {
                        throw new Error('Нет ссылки в ответе');
                    }
                })
                .catch(err => {
                    document.getElementById('message').innerHTML = `<span class="error">Ошибка: ${err.message}</span>`;
                    document.querySelector('.loader').style.display = 'none';
                    console.error(err);
                });
        }
    </script>
</body>
</html>
